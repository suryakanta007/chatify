name: Ping Render Service

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping health endpoint
        run: curl --fail --silent --show-error --max-time 30 "$RENDER_HEALTH_URL"
        env:
          RENDER_HEALTH_URL: ${{ secrets.RENDER_HEALTH_URL }}
